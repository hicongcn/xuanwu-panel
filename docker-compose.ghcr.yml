
services:
  xuanwu:
    image: ghcr.io/hicongcn/xuanwu:latest
    container_name: xuanwu
    ports:
      - "8052:8052"
    volumes:
      - ./xuanwu/data:/app/data
    environment:
      - TZ=Asia/Shanghai
      # 以下环境变量可覆盖配置文件（可选）
      # - XW_SERVER_PORT=8052
      # - XW_SERVER_HOST=0.0.0.0
      # - XW_DB_TYPE=mysql
      # - XW_DB_HOST=localhost
      # - XW_DB_PORT=3306
      # - XW_DB_USER=root
      # - XW_DB_PASSWORD=password
      # - XW_DB_NAME=xuanwu
      # - XW_DB_TABLE_PREFIX=xuanwu_
    restart: unless-stopped
